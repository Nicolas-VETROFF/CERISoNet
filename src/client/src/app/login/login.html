<div class="flex justify-center items-center h-screen">
  <div class="border-green-600 border-2 rounded-lg bg-zinc-800 p-2 w-[400px] h-[300px] flex flex-col justify-center px-8">
    <h2 class="text-xl text-center mb-4">Connexion à CeriSoNet</h2>
    <form
      (submit)="onSubmit(username.value, password.value); $event.preventDefault()"
    >
      <div class="flex flex-col mb-4">
        <label for="username">Email ou Pseudo:</label>
        <input
          #username
          type="text"
          id="username"
          name="username"
          class="bg-zinc-700 border border-zinc-900 rounded p-2"
        />
      </div>

      <div class="flex flex-col mb-4">
        <label for="password">Mot de passe:</label>
        <input
          #password
          type="password"
          id="password"
          name="password"
          class="bg-zinc-700 border border-zinc-900 rounded p-2"
        />
      </div>

      <button type="submit" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded cursor-pointer">
        Me connecter
      </button>
    </form>
  </div>
</div>
