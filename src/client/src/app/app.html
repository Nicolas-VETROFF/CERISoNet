<header class="h-16 flex items-center justify-between px-4 fixed top-0 left-0 right-0 z-10">
  <h1 class="text-2xl font-bold ml-4">CeriSoNet</h1>

  @if (!isConnected()) {
    <button
      class="bg-green-500 hover:bg-green-600 font-bold py-2 px-4 rounded cursor-pointer"
      routerLink="/login"
    >CONNEXION</button>
  } @else {
    <div class="flex gap-2 items-center">
      <img [src]="avatar()" class="w-10 h-10 rounded-full mr-4 bg-zinc-700">
      <p class="text-white mr-4">{{ username() }}</p>
      <button
        class="bg-red-500 hover:bg-red-600 font-bold py-2 px-4 rounded cursor-pointer"
        (click)="logout()"
      >DÉCONNEXION</button>
    </div>
  }
</header>

<main class="mx-40 mt-12">
  <router-outlet />
</main>

<footer class="h-16 bg-zinc-800 flex items-center justify-center px-4 fixed bottom-0 left-0 right-0">

</footer>
